<section>
    <h2 class="section-title">
        <i class="fas fa-award"></i> Awards
    </h2>
    <ul class="list-unstyled">
        {% for award in site.data.awards %}
        <li class="mb-3">
            <i class="fas fa-trophy text-warning"></i>
            {% if award.year %}<span class="text-muted">{{ award.year }}</span> {% endif %}{{ award.name }}
            <br>
            <span class="text-muted ms-4">{{ award.name_zh }}</span>
        </li>
        {% endfor %}
    </ul>
</section>
