<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="keywords" content="Daoyu Li, Homepage, Computational Photography, Computer Vision, Deep Learning">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

    <title>{{ page.title }} | Daoyu Li</title>
</head>

<body>
    <div class="layout-wrapper">

        <!-- Mobile top bar (visible only on small screens) -->
        <nav class="mobile-topbar navbar navbar-light d-md-none">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarCollapse" aria-controls="sidebarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <span class="navbar-brand mb-0">Dr. Daoyu Li</span>
            </div>
        </nav>

        <!-- Sidebar -->
        <aside class="sidebar collapse d-md-block" id="sidebarCollapse">
            {% include sidebar.html %}
        </aside>

        <!-- Main content -->
        <main class="main-content">
            {{ content }}
        </main>

    </div>
</body>
</html>
