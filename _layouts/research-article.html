---
layout: default
---

<article>
    <header class="mb-4">
        <a href="{{ '/research/' | relative_url }}" class="text-muted small">
            <i class="fas fa-arrow-left"></i> Back to Research
        </a>
        <h1 class="mt-2">{{ page.title }}</h1>
        <div class="text-muted">
            <i class="far fa-calendar-alt"></i> {{ page.date | date: "%B %d, %Y" }}
        </div>
    </header>
    <div class="article-content">
        {{ content }}
    </div>
</article>
